{% extends "blog/admin/base.html" %}
{% load static %}

{% block title %}카테고리 관리{% endblock %}

{% block content %}
<div class="layout">
  <h1>게시물 작성</h1>

  <form method="post" enctype="multipart/form-data" style="max-width: 700px;">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn">등록</button>
    <a href="{% url 'blog:admin-post-list' %}" class="btn btn-outline">목록으로</a>
  </form>
{% endblock %}

{% block extra_script %}
  <script>
    function getCookie(name) {
      const cookies = document.cookie ? document.cookie.split(';') : [];

      for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();

        if (cookie.startsWith(name + '=')) {
          return decodeURIComponent(cookie.substring(name.length + 1));
        }
      }

      return null;
    }

    document.addEventListener("DOMContentLoaded", function () {
      const csrfToken = getCookie("csrftoken");

      CKEDITOR.on("instanceReady", function (event) {
        const editor = event.editor;

        editor.on("fileUploadRequest", function (evt) {
          const xhr = evt.data.fileLoader.xhr;

          if (csrfToken) {
            xhr.setRequestHeader("X-CSRFToken", csrfToken);
          }
        });
      });
    });
  </script>
  {% endblock %}
</div>
</body>

</html>
